<!DOCTYPE html>
<html>
<head>
  <title>Kroetz Fix-It</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="./manifest.json">

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    h1 { text-align: center; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0 10px 0;
    }

    button {
      padding: 10px;
      margin: 5px 5px 5px 0;
      border: none;
      border-radius: 5px;
      background: #333;
      color: white;
    }

    .item {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
    }

    .item input { flex: 1; }

    .screen {
      display: none;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Kroetz Fix-It</h1>

<!-- MAIN FORM -->
<div class="card">
  <label>Customer Name</label>
  <input type="text" id="customer">

  <label>Description</label>
  <textarea id="description"></textarea>

  <h3>Items</h3>
  <div id="items"></div>
  <button onclick="addItem()">+ Add Item</button>

  <h3>Total: $<span id="total">0.00</span></h3>

  <button onclick="generateQuote()">Generate Quote</button>
  <button onclick="saveQuote()">Save Quote</button>
  <button onclick="convertToJob()">Convert to Job</button>
  <button onclick="viewQuotes()">View Quotes</button>
  <button onclick="viewJobs()">View Jobs</button>
</div>

<!-- QUOTE PREVIEW -->
<div class="card">
  <h3>Quote Preview</h3>
  <div id="quoteOutput">No quote yet</div>
</div>

<!-- QUOTES SCREEN -->
<div id="quotesScreen" class="screen">
  <h2>Saved Quotes</h2>
  <div id="quotesList"></div>
  <button onclick="closeQuotes()">Back</button>
</div>

<!-- JOBS SCREEN -->
<div id="jobsScreen" class="screen">
  <h2>Jobs</h2>
  <div id="jobsList"></div>
  <button onclick="closeJobs()">Back</button>
</div>

<script>
// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

// ITEM SYSTEM
function addItem(name = "", price = 0) {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML =
    '<input type="text" placeholder="Item" value="' + name + '" class="item-name">' +
    '<input type="number" placeholder="Price" value="' + price + '" class="item-price" oninput="calculateTotal()">' +
    '<button onclick="this.parentElement.remove(); calculateTotal()">X</button>';

  document.getElementById("items").appendChild(div);
}

function calculateTotal() {
  let total = 0;

  document.querySelectorAll(".item-price").forEach(input => {
    total += Number(input.value) || 0;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

function getItems() {
  const items = [];

  document.querySelectorAll(".item").forEach(div => {
    items.push({
      name: div.querySelector(".item-name").value,
      price: div.querySelector(".item-price").value
    });
  });

  return items;
}

// QUOTES STORAGE
function getQuotes() {
  return JSON.parse(localStorage.getItem("quotes") || "[]");
}

function saveQuotes(data) {
  localStorage.setItem("quotes", JSON.stringify(data));
}

// SAVE QUOTE
function saveQuote() {
  const customer = document.getElementById("customer").value;
  const description = document.getElementById("description").value;
  const total = document.getElementById("total").innerText;
  const items = getItems();

  if (!customer || total === "0.00") {
    alert("Add customer and items first");
    return;
  }

  const quotes = getQuotes();

  quotes.push({
    id: Date.now(),
    customer,
    description,
    items,
    total,
    created: new Date().toLocaleString()
  });

  saveQuotes(quotes);
  alert("Quote saved!");
}

// VIEW QUOTES
function viewQuotes() {
  document.getElementById("quotesScreen").style.display = "block";
  document.getElementById("jobsScreen").style.display = "none";

  const quotes = getQuotes();
  const container = document.getElementById("quotesList");

  container.innerHTML = "";

  if (quotes.length === 0) {
    container.innerHTML = "<p>No quotes yet</p>";
    return;
  }

  quotes.forEach(q => {
    let html = "<div style='border:1px solid #ccc; padding:10px; margin:10px 0;'>";
    html += "<strong>" + q.customer + "</strong><br>";
    html += q.description + "<ul>";

    q.items.forEach(i => {
      html += "<li>" + i.name + " - $" + i.price + "</li>";
    });

    html += "</ul><strong>Total: $" + q.total + "</strong></div>";

    container.innerHTML += html;
  });
}

function closeQuotes() {
  document.getElementById("quotesScreen").style.display = "none";
}

// JOBS STORAGE
function getJobs() {
  return JSON.parse(localStorage.getItem("jobs") || "[]");
}

function saveJobs(data) {
  localStorage.setItem("jobs", JSON.stringify(data));
}

// CONVERT TO JOB
function convertToJob() {
  const customer = document.getElementById("customer").value;
  const description = document.getElementById("description").value;
  const total = document.getElementById("total").innerText;
  const items = getItems();

  if (!customer || total === "0.00") {
    alert("Add customer and items first");
    return;
  }

  const jobs = getJobs();

  jobs.push({
    id: Date.now(),
    customer,
    description,
    items,
    total,
    created: new Date().toLocaleString()
  });

  saveJobs(jobs);
  alert("Job created!");
}

// VIEW JOBS
function viewJobs() {
  document.getElementById("jobsScreen").style.display = "block";
  document.getElementById("quotesScreen").style.display = "none";

  const jobs = getJobs();
  const container = document.getElementById("jobsList");

  container.innerHTML = "";

  if (jobs.length === 0) {
    container.innerHTML = "<p>No jobs yet</p>";
    return;
  }

  jobs.forEach(j => {
    let html = "<div style='border:1px solid #ccc; padding:10px; margin:10px 0;'>";
    html += "<strong>" + j.customer + "</strong><br>";
    html += j.description + "<ul>";

    j.items.forEach(i => {
      html += "<li>" + i.name + " - $" + i.price + "</li>";
    });

    html += "</ul><strong>Total: $" + j.total + "</strong></div>";

    container.innerHTML += html;
  });
}

function closeJobs() {
  document.getElementById("jobsScreen").style.display = "none";
}

// QUOTE PREVIEW
function generateQuote() {
  const customer = document.getElementById("customer").value;
  const description = document.getElementById("description").value;
  const total = document.getElementById("total").innerText;
  const items = getItems();

  let html = "<strong>" + customer + "</strong><br>" + description + "<ul>";

  items.forEach(i => {
    html += "<li>" + i.name + " - $" + i.price + "</li>";
  });

  html += "</ul><strong>Total: $" + total + "</strong>";

  document.getElementById("quoteOutput").innerHTML = html;
}

// INIT
window.onload = function() {
  addItem();
};
</script>

</body>
</html>
