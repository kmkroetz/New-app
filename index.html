<!DOCTYPE html>
<html>
<head>
  <title>Kroetz Fix-It</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="manifest" href="/Kroetz-fix-it-app/manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/kroetz-fix-it-app/service-worker.js');
    }
  </script>

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      background:#f4f4f4; 
    }
    h1 { text-align:center; }
    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
    }
    input, textarea, button {
      width:100%;
      margin-top:8px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button {
      background:black;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
    .delete {
      background:red;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h1>Kroetz Fix-It</h1>

<div class="card">
  <h3>Create Quote</h3>
  <input id="name" placeholder="Customer Name">
  <input id="job" placeholder="Job Description">
  <input id="price" placeholder="Price">
  <button onclick="saveQuote()">Save Quote</button>
</div>

<div class="card">
  <h3>Saved Quotes</h3>
  <div id="quotes"></div>
</div>

<script>
function saveQuote() {
  let name = document.getElementById("name").value.trim();
  let job = document.getElementById("job").value.trim();
  let price = document.getElementById("price").value.trim();

  if (!name || !job || !price) {
    alert("Please fill out all fields");
    return;
  }

  let quote = {name, job, price};
  let quotes = JSON.parse(localStorage.getItem("quotes")) || [];

  quotes.push(quote);
  localStorage.setItem("quotes", JSON.stringify(quotes));

  document.getElementById("name").value = "";
  document.getElementById("job").value = "";
  document.getElementById("price").value = "";

  displayQuotes();
}

function deleteQuote(index) {
  let quotes = JSON.parse(localStorage.getItem("quotes")) || [];
  quotes.splice(index, 1);
  localStorage.setItem("quotes", JSON.stringify(quotes));
  displayQuotes();
}
