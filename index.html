<!DOCTYPE html>
<html>
<head>
  <title>Kroetz Fix-It</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0 10px 0;
    }

    button {
      padding: 10px;
      margin: 5px 5px 5px 0;
      border: none;
      border-radius: 5px;
      background: #333;
      color: white;
    }

    #jobsScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      overflow: auto;
      padding: 20px;
      display: none;
    }
  </style>
</head>

<body>

  <h1>Kroetz Fix-It</h1>

  <div class="card">
    <label>Customer Name</label>
    <input type="text" id="customer">

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Total ($)</label>
    <input type="number" id="total" placeholder="Enter total">

    <button onclick="generateQuote()">Generate Quote</button>
    <button onclick="convertToJob()">Convert to Job</button>
    <button onclick="viewJobs()">View Jobs</button>
  </div>

  <div class="card">
    <h3>Quote Preview</h3>
    <p id="quoteOutput">No quote yet</p>
  </div>

  <!-- JOBS SCREEN -->
  <div id="jobsScreen">
    <h2>Jobs</h2>
    <div id="jobsList"></div>
    <button onclick="closeJobs()">Close</button>
  </div>

  <script>
    function generateQuote() {
      const customer = document.getElementById("customer").value;
      const description = document.getElementById("description").value;
      const total = document.getElementById("total").value;

      document.getElementById("quoteOutput").innerHTML =
        `<strong>${customer}</strong><br>${description}<br>Total: $${total}`;
    }

    // STORAGE
    function getJobs() {
      return JSON.parse(localStorage.getItem("jobs") || "[]");
    }

    function saveJobs(jobs) {
      localStorage.setItem("jobs", JSON.stringify(jobs));
    }

    // CONVERT TO JOB
    function convertToJob() {
      const customer = document.getElementById("customer").value;
      const description = document.getElementById("description").value;
      const total = document.getElementById("total").value;

      if (!customer || !total) {
        alert("Add customer and total first");
        return;
      }

      const jobs = getJobs();

      const newJob = {
        id: Date.now(),
        customer,
        description,
        total,
        status: "Pending",
        created: new Date().toLocaleString()
      };

      jobs.push(newJob);
      saveJobs(jobs);

      alert("Job created!");
    }

    // VIEW JOBS
    function viewJobs() {
      const jobs = getJobs();
      const container = document.getElementById("jobsList");

      container.innerHTML = "";

      if (jobs.length === 0) {
        container.innerHTML = "<p>No jobs yet</p>";
      }

      jobs.forEach(job => {
        container.innerHTML += `
          <div style="border:1px solid #ccc; padding:10px; margin:10px 0;">
            <strong>${job.customer}</strong><br>
            ${job.description}<br>
            Total: $${job.total}<br>
            Status: ${job.status}<br>
            <small>${job.created}</small>
          </div>
        `;
      });

      document.getElementById("jobsScreen").style.display = "block";
    }

    // CLOSE JOBS
    function closeJobs() {
      document.getElementById("jobsScreen").style.display = "none";
    }
  </script>

</body>
</html>
