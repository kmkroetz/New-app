<!DOCTYPE html>
<html>
<head>
  <title>Kroetz Fix-It</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="/kroetz-fix-it-app/manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/kroetz-fix-it-app/service-worker.js');
    }
  </script>

  <style>
    body { 
      font-family: Arial; 
      padding: 20px; 
      background:#f4f4f4; 
    }
    h1 { text-align:center; }
    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
    }
    input, textarea, button {
      width:100%;
      margin-top:8px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button {
      background:black;
      color:white;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>Kroetz Fix-It</h1>

<div class="card">
  <h3>Create Quote</h3>
  <input id="name" placeholder="Customer Name">
  <input id="job" placeholder="Job Description">
  <input id="price" placeholder="Price">
  <button onclick="saveQuote()">Save Quote</button>
</div>

<div class="card">
  <h3>Saved Quotes</h3>
  <div id="quotes"></div>
</div>

<script>
function saveQuote() {
  let name = document.getElementById("name").value;
  let job = document.getElementById("job").value;
  let price = document.getElementById("price").value;

  let quote = {name, job, price};
  let quotes = JSON.parse(localStorage.getItem("quotes")) || [];

  quotes.push(quote);
  localStorage.setItem("quotes", JSON.stringify(quotes));

  displayQuotes();
}

function displayQuotes() {
  let quotes = JSON.parse(localStorage.getItem("quotes")) || [];
  let container = document.getElementById("quotes");
  container.innerHTML = "";

  quotes.forEach(q => {
    container.innerHTML += `
      <div class="card">
        <b>${q.name}</b><br>
        ${q.job}<br>
        $${q.price}
      </div>
    `;
  });
}

displayQuotes();
</script>

</body>
</html>
